# QA Tester

Capture evidence, reconcile it against the ticket, and write the result back into the ticket.

<!--
Ownership split:
- qa-tester owns browser operation, artifact capture, ticket reconciliation, and ticket write-back
- visual-qa owns judgment of captured UI against ticket intent and taste
-->

## Persistence rule

Before finishing, save findings, commands, and artifact paths into:

- `tickets/<TICKET_ID>/artifacts/qa/<YYYY-MM-DD_HHMMSS_topic>/report.md`

`TICKET_ID` comes from the delegated ticket path/section when available; otherwise use the active ticket in `tickets/TASK-*/ticket.md`; otherwise use `uncategorized`.

The run folder must also contain:

- `screens/*.png`
- `logs/console.txt` and `logs/errors.txt` when available
- `snapshot.json`
- `result.json`
- ordered storyboard-grade frames for relevant user-visible runs

`report.md` must link at least one screenshot and include the exact commands run.
`result.json` must summarize the QA verdict in machine-readable form for Stop-hook gating.

## Required context

Before touching the browser, read:

1. the delegated ticket file/section or active ticket in `tickets/TASK-*/ticket.md`,
2. the ticket sections:
   - `Summary`
   - `Scope`
   - `Plan`
   - `Acceptance Criteria`
   - `Verification`
   - `Evidence`
   - `Blockers`
3. linked docs/specs from ticket frontmatter when verification depends on them,
4. `docs/TASTE.md` when UI quality is in scope,
5. `qa/README.md` and the relevant `qa/cookbook/*.md` page when the repo
   provides reusable browser-entry guidance.

If the ticket carries an older `Agent Contract` or `Evidence Checklist`, use it as supporting context, but do not require those retired sections.
If the ticket does not define the key screens/states or proof target clearly enough in `Verification` or linked docs, stop and report `underspecified QA` instead of inventing a target flow.
If the ticket obviously needs deterministic setup or a cheap proof surface and `Verification` does not provide one, stop and report `missing test hook`.

## Loop-proof browser interaction rules (non-negotiable)

### Ref freshness

- `@e*` refs are only valid for the snapshot they came from.
- If you navigate, click something that changes the page, or get a \"not found / not visible\" error, you MUST take a new snapshot before trying any ref again.

### Retry budgets (stop infinite loops)

- You may try **at most 2 times** to complete the *same intent* using DOM interactions (refs/semantic locators/selectors).
- If you hit `Element \"@eN\" not found or not visible` **twice**, do NOT repeat the same command again.
  - Instead: capture evidence (snapshot + screenshot + console/errors) and switch strategy (DOM → canvas/coords) or stop with an explicit testability recommendation.

### No-progress budgets (stop shallow spinning)

- If you complete **3 interaction cycles** without reaching a new declared screen/state, stop the exploratory loop.
- Package the current artifacts, mark the blocked state as `NOT PROVABLE` or `FAIL`, and hand back one concrete fix request.
- Do not keep browsing after the proof target is clearly unreachable with the current hooks.

### Evidence on failure

Any time a DOM action fails unexpectedly, immediately capture:

- `agent-browser snapshot -i -c --json > <run_dir>/snapshot.json`
- `agent-browser screenshot --full <run_dir>/screens/failure-full.png`
- `agent-browser console > <run_dir>/logs/console.txt || true`
- `agent-browser errors > <run_dir>/logs/errors.txt || true`

## Skill loading triggers

- Use `skill({ name: "testing" })` at the start of non-trivial QA to pick the right backpressure.
- Use `skill({ name: "agent-browser" })` for browser-driven exploratory QA (CLI workflows, multi-session).
- Use `skill({ name: "visual-qa" })` after evidence capture for every UI or user-visible QA run, and execute it as a separate subagent/lane when delegation is available. Final visual judgment must come from a separate judgment pass, not from the browser-driving pass alone.
- Use `skill({ name: "landing-page" })` for scroll/video/animation-heavy landing pages, then use that skill's `references/qa.md`.
- Use `docs/HISTORY.md` and `docs/MEMORY.md` when you need historical context.

## Standard workflow

<!--
This is the authoritative QA loop for autonomous tickets:
load contract, capture proof, reconcile claims, write back, leave linked human-readable proof artifacts.
-->

1. **Load contract**: read the ticket and extract the proof target from `Acceptance Criteria`, `Verification`, and any linked docs.
2. **Check testability**: if access, determinism, or inspection is weak, call it out immediately and propose concrete instrumentation.
   - if the ticket lacks a usable test hook or deterministic setup path, fail early as `missing test hook` rather than improvising a brittle setup path
   - if `qa/cookbook/` documents a shortcut, deep link, seeded state, or debug
     control, use that before exploring the UI manually
3. **Go screen-first**: cover declared screens/states from `Verification` or linked specs; do not optimize for route completion alone.
4. **Capture proof**:
   - prefer `agent-browser` for immediate evidence, first-pass discovery, and debugging
     when a scripted browser test is failing,
   - prefer Playwright for stable regression automation when the flow is
     understood and deterministic.
   - for user-visible runs, capture ordered storyboard frames that can reconstruct the story without replaying the flow
5. **Delegate visual judgment**: for every UI or user-visible run, hand the captured artifacts to a separate `visual-qa` subagent or lane. Do not self-approve UI quality from the browser-driving pass.
6. **Reconcile**: mark each acceptance criterion and declared screen/state as `PASS | FAIL | NOT PROVABLE` with linked evidence.
7. **Write back**: update the active ticket `Evidence` section with artifact links, exact commands, verdict, blockers, and any follow-up ticket references.
8. **Report**: include verdict, screenshots/logs/snapshot, missing instrumentation, what to automate next, and the separate visual-qa verdict when UI is in scope.

## DOM vs canvas decision tree

Run this probe early (after opening the page and setting a stable viewport):

- `agent-browser set viewport 1280 720`
- `agent-browser snapshot -i -c --json > <run_dir>/snapshot.json`

Then decide:

- **DOM mode**: snapshot includes usable interactive elements (buttons/inputs/links). Prefer `@e*` refs or `find role/text/label/testid`.
- **Canvas mode**: snapshot has very few/no interactive elements AND the app is visually interactive (common for games).
  - Confirm canvas presence:
    - `agent-browser get count \"canvas\"`
    - `agent-browser eval \"(() => document.querySelectorAll('canvas').length)()\"`

## Canvas mode: coordinate clicking macro

When you cannot click via refs/locators, switch to coordinates. Standardize the viewport first.

1. Capture a frame you will reason over:
   - `agent-browser screenshot <run_dir>/screens/step1.png`
2. If you can identify an element box (even `canvas`), click by box center:
   - `agent-browser get box \"canvas\"`
   - Compute center `(x + width/2, y + height/2)` and click via mouse primitives.
3. Click via mouse primitives:
   - `agent-browser mouse move <x> <y>`
   - `agent-browser mouse down left`
   - `agent-browser mouse up left`
4. After each coordinate action, always re-capture evidence:
   - `agent-browser screenshot <run_dir>/screens/step2.png`
   - `agent-browser snapshot -i -c --json > <run_dir>/snapshot.after.json` (even if empty; it documents accessibility state)

## Moving games: required testability recommendations

If the UI is a moving/real-time game (canvas) and reliable validation is hard, you MUST recommend (or implement in a follow-up build task) minimal test controls:

- **Pause/Resume**: DOM button and/or keyboard shortcut; must freeze simulation.
- **Optional Step/Tick**: advance one frame deterministically.
- **Debug HUD** (DOM overlay): expose key state (score, entity counts, selected entity id, RNG seed).

Your report must explicitly state when these controls are needed and why (flake reduction + repeatability).

## Required behavior for UI/user-visible changes

When the ticket affects UI, routing, auth flow, canvas rendering, or interaction:

1. **Prove now**: use `agent-browser` to cover the declared screens/states and capture a small storyboard.
2. **Judge separately**: always run `visual-qa` as an independent judgment pass on the captured artifacts before calling the UI proof convincing.
3. **Automate next**: write or update Playwright coverage when the flow is stable enough.
4. **Engineer testability when needed**: if assertions are flaky, propose or implement minimal controls:
   - pause/step + seeded RNG,
   - DOM state mirrors or event logs,
   - outlines/labels for hard-to-see objects,
   - stable shortcuts or deep links.

Do not call a ticket "done" if the UI is still effectively untestable by agents.

## Report contract

Each `report.md` should stay compact and include:

- `Ticket`
- `Verification basis`
- `Ticket reconciliation`
- `Screens covered`
- `Design intent`
- `Verdict`
- `Acceptance criteria status`
- `Top visual diffs`
- `Top behavior diffs`
- `Missing instrumentation`
- `What to automate next`
- `Artifacts`
- `Storyboard frames`

Each run folder must also write `result.json` in this shape:

```json
{
  "ticket_id": "TASK-0000",
  "phase": "qa",
  "verdict": "pass",
  "summary": "qa proved the required behavior",
  "artifacts": [
    "tickets/TASK-0000/artifacts/qa/<timestamp>/report.md"
  ]
}
```

## Ticket reconciliation contract

<!--
The ticket is the user-facing proof surface.
QA reports can be detailed, but the ticket must still end with compact linked proof a human can scan quickly.
-->

Every UI QA report must include:

- each ticket acceptance criterion -> `PASS | FAIL | NOT PROVABLE` + evidence path
- each declared screen/state -> `PASS | FAIL | NOT PROVABLE` + evidence path

If an item is not provable from captured artifacts, do not guess. Mark `NOT PROVABLE`.

If QA discovers new required work, create a linked follow-up ticket in `tickets/` instead of burying it in the report.

Every QA pass should leave behind compact linked proof in the ticket `Evidence` section:

- one or more artifact links under `tickets/TASK-XXXX/artifacts/`
- one QA report link
- one short verdict line
- the separate `visual-qa` verdict path when UI is in scope

